<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嵌入式应用开发 · 刷题系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 data-i18n="appTitle">📚 嵌入式应用开发</h1>
      <p class="subtitle" data-i18n="subtitle">2025-2026学年第2学期 · 客观题刷题系统（共167题）</p>
    </header>
    <!-- 统计仪表盘 v6.0（已移除正确率趋势图） -->
    <div class="card">
      <h2 data-i18n="dashboard">📊 学习仪表盘</h2>
      <div class="stat-grid" id="statGrid">
        <div class="stat-item"><div class="stat-num" id="stTotal">167</div><div class="stat-label" data-i18n="totalQuestions">总题量</div></div>
        <div class="stat-item"><div class="stat-num" id="stAnswered">0</div><div class="stat-label" data-i18n="answered">已作答</div></div>
        <div class="stat-item"><div class="stat-num" id="stCorrect">0</div><div class="stat-label" data-i18n="correctCount">正确数</div></div>
        <div class="stat-item"><div class="stat-num" id="stWrong">0</div><div class="stat-label" data-i18n="wrongCount">错题数</div></div>
        <div class="stat-item"><div class="stat-num" id="stAccuracy">0%</div><div class="stat-label" data-i18n="accuracy">正确率</div></div>
        <div class="stat-item"><div class="stat-num" id="stSessions">0</div><div class="stat-label" data-i18n="sessionCount">练习次数</div></div>
      </div>
    </div>
    <!-- 快速开始 -->
    <div class="card">
      <h2 data-i18n="quickStart">🚀 快速开始</h2>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;">
        <a href="exam.html?type=all" class="btn btn-primary btn-block">📝 <span data-i18n="sequentialAll">顺序刷题（全部）</span></a>
        <a href="exam.html?type=all&random=1" class="btn btn-primary btn-block">🎲 <span data-i18n="randomQuiz">随机刷题</span></a>
        <a href="exam.html?type=all&mode=review" class="btn btn-success btn-block">📖 <span data-i18n="reviewBrowse">背题浏览</span></a>
        <a href="exam.html?type=all&mode=exam" class="btn btn-danger btn-block">🏁 <span data-i18n="mockExam">模拟考试</span></a>
        <a href="collect.html" class="mode-card collect">
            <span class="mode-icon">⭐</span>
            <span class="mode-label" data-i18n="collectPage">📂 收藏夹</span>
          </a>
          <a href="wrong.html" class="btn btn-secondary btn-block">📕 <span data-i18n="wrongTraining">错题训练</span> <span id="wrongBadge" class="badge badge-danger" style="display:none;">0</span></a>
      </div>
    </div>
    <!-- 分类入口 -->
    <div class="card">
      <h2 data-i18n="categoryQuiz">📂 分类刷题</h2>
      <div class="type-grid" id="typeGrid"></div>
    </div>
    <!-- 全局设置 v6.0（已移除趋势图相关描述） -->
    <div class="card">
      <h2 data-i18n="settings">⚙️ 全局设置</h2>
      <div class="setting-row">
        <label data-i18n="darkMode">🌓 深色模式</label>
        <label class="toggle-sw"><input type="checkbox" id="darkSwitch" onchange="DarkMode.toggle()"><span class="toggle-slider"></span></label>
      </div>
      <div class="setting-row">
        <label data-i18n="hotkey">⌨️ 快捷键 (1/2/3/4 + ← → Enter)</label>
        <label class="toggle-sw"><input type="checkbox" id="hkSwitch" checked onchange="toggleHotkey(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div class="setting-row">
        <label data-i18n="randomOptions">🔀 选项随机打乱</label>
        <label class="toggle-sw"><input type="checkbox" id="randomOptSwitch" onchange="toggleRandomOpt(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <div class="setting-row">
        <label data-i18n="autoJumpDelay">⏱️ 自动跳转延迟 (ms, 0=关闭)</label>
        <input type="number" class="inline-input" id="autoJumpDelay" value="1200" min="0" max="5000" step="100" onchange="updateAutoJump(this.value)" style="width:80px;">
      </div>
      <div class="btn-group mt-12">
        <button class="btn btn-danger btn-sm" onclick="confirmClear('all')">🗑️ <span data-i18n="clearAllRecords">清空全部记录</span></button>
        <button class="btn btn-warn btn-sm" onclick="confirmClear('wrong')">🗑️ <span data-i18n="clearWrongOnly">仅清空错题</span></button>
        <button class="btn btn-danger btn-sm" onclick="confirmClear('answers')">🗑️ <span data-i18n="clearAnswersOnly">仅清空作答</span></button>
      </div>
    </div>
    <footer class="footer"><p data-i18n="version">纯前端 · localStorage 持久化 · 零依赖 · GitHub Pages 部署 · v6.0</p></footer>
  </div>
  <!-- 确认弹窗 -->
  <div class="modal-overlay" id="confirmModal" style="display:none;">
    <div class="modal-box">
      <h3 id="confirmTitle" data-i18n="confirmTitle">确认操作</h3>
      <p id="confirmMsg"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-sm" onclick="closeModal()"><span data-i18n="cancel">取消</span></button>
        <button class="btn btn-danger btn-sm" id="confirmOk" onclick="execClear()"><span data-i18n="confirmClear">确认清除</span></button>
      </div>
    </div>
  </div>
  <script src="js/question.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/common.js"></script>
  <script src="js/darkmode.js"></script>
  <script>
    Storage.init();
    DarkMode.init();
    I18N.applyToDOM();
    // ========== 同步设置面板 v6.0 ==========
    (function() {
      const pref = Storage.getPref();
      document.getElementById('darkSwitch').checked = pref.darkMode || false;
      document.getElementById('hkSwitch').checked = pref.hotkeyEnabled !== false;
      document.getElementById('randomOptSwitch').checked = pref.randomOptions || false;
      document.getElementById('autoJumpDelay').value = pref.autoJumpDelay !== undefined ? pref.autoJumpDelay : 1200;
    })();
    // ========== 设置回调 ==========
    window.toggleHotkey = function(v) { Storage.setPref({ hotkeyEnabled: v }); };
    window.toggleRandomOpt = function(v) { Storage.setPref({ randomOptions: v }); };
    window.updateAutoJump = function(v) {
      Storage.setPref({ autoJumpDelay: parseInt(v) || 0 });
    };
    // ========== 确认弹窗 ==========
    let clearTarget = '';
    window.confirmClear = function(type) {
      clearTarget = type;
      const title = document.getElementById('confirmTitle');
      const msg = document.getElementById('confirmMsg');
      if (type === 'all') {
        title.textContent = '清空全部记录';
        msg.textContent = '⚠️ 确定要清空所有作答记录、错题本和统计数据吗？此操作不可恢复！';
      } else if (type === 'wrong') {
        title.textContent = '清空错题本';
        msg.textContent = '确定清空所有错题记录吗？作答记录保留。';
      } else if (type === 'answers') {
        title.textContent = '清空作答记录';
        msg.textContent = '确定清空全部作答记录吗？错题本保留。';
      }
      document.getElementById('confirmModal').style.display = 'flex';
    };
    window.closeModal = function() { document.getElementById('confirmModal').style.display = 'none'; };
    window.execClear = function() {
      if (clearTarget === 'all') {
        Storage.clearAllAnswers();
        Storage.clearAllWrong();
        Storage.clearProgress();
        localStorage.removeItem('eq_global_stats');
        localStorage.removeItem('eq_q_meta');
      } else if (clearTarget === 'wrong') {
        Storage.clearAllWrong();
      } else if (clearTarget === 'answers') {
        Storage.clearAllAnswers();
      }
      document.getElementById('confirmModal').style.display = 'none';
      location.reload();
    };
    // ========== 仪表盘渲染 v6.0（已移除趋势图） ==========
    (function renderDashboard() {
      let answered = 0, correct = 0;
      questionList.forEach(q => {
        const ans = Storage.getAnswer(q.id);
        if (ans) {
          answered++;
          if (Storage.checkCorrect(q.id, ans)) correct++;
        }
      });
      const wrongCount = Storage.getWrongList().length;
      document.getElementById('stTotal').textContent = questionList.length;
      document.getElementById('stAnswered').textContent = answered;
      document.getElementById('stCorrect').textContent = correct;
      document.getElementById('stWrong').textContent = answered - correct;
      document.getElementById('stAccuracy').textContent =
        answered > 0 ? (correct / answered * 100).toFixed(1) + '%' : '0%';
      const stats = Storage.getStats();
      document.getElementById('stSessions').textContent = stats.totalSessions || 0;
      // 错题徽章
      const wb = document.getElementById('wrongBadge');
      if (wrongCount > 0) { wb.style.display = 'inline-block'; wb.textContent = wrongCount; }
      else wb.style.display = 'none';
      // 题型入口
      const grid = document.getElementById('typeGrid');
      const types = ['radio', 'checkbox', 'fill', 'judge'];
      types.forEach(t => {
        const qs = questionList.filter(q => q.type === t);
        let ans = 0, corr = 0;
        qs.forEach(q => {
          const a = Storage.getAnswer(q.id);
          if (a) { ans++; if (Storage.checkCorrect(q.id, a)) corr++; }
        });
        const pct = qs.length > 0 ? Math.round((ans / qs.length) * 100) : 0;
        grid.innerHTML += `<a href="exam.html?type=${t}" class="type-card">
          <div class="type-icon">${App.getTypeIcon(t)}</div>
          <div class="type-name">${App.getTypeName(t)}</div>
          <div class="type-count">${qs.length}题 · 已做${ans} · 对${corr}</div>
          <div class="type-progress"><div class="fill-bar" style="width:${pct}%"></div></div></a>`;
      });
    })();
  </script>
</body>
</html>
