<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>刷题 - 嵌入式应用开发</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <div class="eq-container">
    <header class="eq-header" style="padding-bottom:8px;">
      <h1>📝 刷题</h1>
      <p class="eq-subtitle" id="subtitle">加载中...</p>
    </header>
    <!-- 进度条 + 统计 -->
    <div class="eq-progress-bar"><div class="eq-progress-fill" id="eqProgressBar" style="width:0%"></div></div>
    <div class="eq-progress-text">
      <span id="eqProgressText">0/0</span>
      <span id="eqTopStats">✅ 0 | ❌ 0 | 📊 0/0</span>
    </div>
    <!-- 工具栏 -->
    <div class="eq-toolbar">
      <div class="eq-filter-group" id="filterGroup">
        <button class="eq-type-btn active" data-type="all">全部</button>
        <button class="eq-type-btn" data-type="radio">单选</button>
        <button class="eq-type-btn" data-type="checkbox">多选</button>
        <button class="eq-type-btn" data-type="fill">填空</button>
        <button class="eq-type-btn" data-type="judge">判断</button>
      </div>
      <div class="eq-tool-actions">
        <label class="eq-toggle-label">题量
          <input type="number" class="eq-inline-input" id="customCount" value="0" min="0" max="167" onchange="setCustomCount()" title="0=全部">
        </label>
        <label class="eq-toggle-label">
          <input type="checkbox" id="randomToggle" onchange="toggleRandom()"> 随机
        </label>
        <label class="eq-toggle-label" title="打乱每道题的A/B/C/D选项展示顺序">
          <input type="checkbox" id="optRandomToggle" onchange="toggleOptRandom()"> 🔀随机选项
        </label>
        <button class="eq-mode-tab active" data-mode="normal">常规</button>
        <button class="eq-mode-tab" data-mode="review">背题</button>
        <button class="eq-mode-tab" data-mode="exam">考试</button>
        <a href="index.html" class="eq-btn eq-btn-secondary eq-btn-sm">🏠</a>
        <a href="#" class="eq-btn eq-btn-warn eq-btn-sm" id="eqBtnBackWrong" style="display:none;">📕 返回错题本</a>
        <a href="#" class="eq-btn eq-btn-warn eq-btn-sm" id="eqBtnBackCollect" style="display:none;">⭐ 返回收藏夹</a>
      </div>
    </div>
    <!-- 答题卡缩略图 -->
    <div class="eq-sheet-grid" id="eqSheetGrid"></div>
    <!-- 题目卡片 -->
    <div class="eq-q-card" id="qCard">
      <div class="eq-q-header">
        <span id="eqQuestionTitle">
          <span class="eq-q-index"></span>
          <span class="eq-q-type"></span>
          <span class="eq-q-text"></span>
        </span>
      </div>
      <div class="eq-q-img-wrap" id="eqQuestionImgWrap" style="display:none;">
        <img id="eqQuestionImg" src="" alt="" style="display:none;">
      </div>
      <div id="eqAnswerArea"></div>
      <!-- 答案面板 -->
      <div class="eq-answer-box" id="eqAnswerBox" style="display:none;"></div>
      <!-- 笔记 + 标签 + 收藏 -->
      <div id="eqNoteTag" style="display:none;"></div>
    </div>
    <!-- 导航按钮 -->
    <div class="eq-nav-row">
      <button class="eq-btn eq-btn-secondary eq-btn-sm" id="eqBtnPrev">⬅ 上一题</button>
      <button class="eq-btn eq-btn-secondary eq-btn-sm" id="eqBtnNext">下一题 ➡</button>
      <button class="eq-btn eq-btn-danger eq-btn-sm eq-exam-only" id="eqBtnSubmitExam" style="display:none;">📊 交卷</button>
      <button class="eq-btn eq-btn-warn eq-btn-sm eq-non-exam" id="eqBtnRedo">🔄 重做本次练习</button>
      <button class="eq-btn eq-btn-secondary eq-btn-sm" id="eqBtnClearProgress">🗑️ 清空进度</button>
      <span class="eq-nav-info" id="navInfo"></span>
    </div>
    <footer class="eq-footer"><p>⌨️ 快捷键: 1-4选ABCD，←→翻题，Enter下一题</p></footer>
  </div>
  <!-- 考试报告弹窗 -->
  <div class="eq-modal-overlay" id="eqExamReport" style="display:none;">
    <div class="eq-modal-box" style="text-align:center;">
      <h3>📊 考试完成</h3>
      <div class="eq-exam-score" id="eqExamScore">0</div>
      <div style="font-size:.88rem;">分</div>
      <div class="eq-exam-detail" id="eqExamDetail"></div>
      <div class="eq-modal-actions" style="justify-content:center;">
        <button class="eq-btn eq-btn-secondary eq-btn-sm" id="eqBtnCloseReport">查看错题</button>
        <a href="report.html" class="eq-btn eq-btn-primary eq-btn-sm">查看详细报告</a>
      </div>
    </div>
  </div>
  <!-- ====== JS 模块：严格按依赖顺序加载 ====== -->
  <script src="js/question.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/common.js"></script>
  <script src="js/picker.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/state.js"></script>
  <script src="js/app.js"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/page.js"></script>
</body>
</html>
